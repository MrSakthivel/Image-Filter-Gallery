<!DOCTYPE html>
{% load static %}
<html>
<head>
    <link rel="stylesheet" href="{% static 'css/style.css'%}">
</head>
<body>

<div class="upload-wrapper">

    <h2>Upload Image</h2>

    <a href="/" class="back-btn">Back to Gallery</a>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>

</div>

</body>
</html>
